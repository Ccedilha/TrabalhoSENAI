<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carteira Global · Total</title>
</head>
<body>

  <header>
    <h1>Carteira Global</h1>
    <p>Conversor de moedas e controle de gastos</p>
  </header>
  <div></div>
  <main>
    <section>
      <div>
        <h2>Total gasto (convertido)</h2>
        <div>
          <p>Total em Reais (BRL)<p>
          <p id="1"><strong id="totalReal"></strong></p>
        </div>
        <div>
          <p>Total em Dólar (USD)</p>
          <p id="2"><strong id="totalDolar"></strong></p>
        </div>
        <div class="3">
          <p>Total em Euro (EUR)</p>
          <p id="4"><strong id="totalEuro"></strong></p>
        </div>
        <div>
          <p>Total em Bitcoin (BTC)</p>
          <p id="5"><strong id="totalBitcoin"></strong></p>
        </div>
      </div>
    </section>
  </main>

</body>
</html>
