<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carteira Global · Total</title>
</head>
<body>

  <header>
    <h1>Carteira Global</h1>
    <p>Conversor de moedas e controle de gastos</p>
  </header>
  <nav id="tabs">
    <a href="extrato.html">Extrato</a>
    <a href="total.html">Total</a>
  </nav>
  <section id="ticker">
    <div id="ticker-track"></div>
  </section>
  <div id="fallback-banner"></div>
  <main>
    <section id="page-total">
      <div id="total-panel">
        <h2>Total gasto (convertido)</h2>
        <div class="total-row">
          <span>Total em Reais (BRL)</span>
          <span id="total-brl">R$ 0,00</span>
        </div>
        <div class="total-row">
          <span>Total em Dólar (USD)</span>
          <span id="total-usd">$ 0,00</span>
        </div>
        <div class="total-row">
          <span>Total em Euro (EUR)</span>
          <span id="total-eur">€ 0,00</span>
        </div>
        <div class="total-row">
          <span>Total em Bitcoin (BTC)</span>
          <span id="total-btc">₿ 0,00000000</span>
        </div>
      </div>
    </section>
  </main>

</body>
</html>
