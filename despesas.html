<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carteira Global - Total</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <header class="bg-dark text-white py-4 mb-4">
    <div class="container">
      <h1 class="h3 mb-1">Carteira Global</h1>
      <p class="mb-0 text-white-50">Conversor de moedas e controle de gastos</p>
    </div>
  </header>

  <div class="container">

    <ul class="nav nav-pills mb-4">
      <li class="nav-item">
        <a class="nav-link" href="index.html">Extrato</a>
      </li>
      <li class="nav-item">
        <a class="nav-link active" href="despesas.html">Total</a>
      </li>
    </ul>

    <div id="fallback-banner" class="alert alert-warning d-none" role="alert"></div>

    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="h5 card-title mb-4">Total gasto (convertido)</h2>

        <div class="row text-center g-3">
          <div class="col-6 col-md-3">
            <p class="text-muted mb-1">Reais (BRL)</p>
            <strong id="totalReal" class="fs-5"></strong>
          </div>
          <div class="col-6 col-md-3">
            <p class="text-muted mb-1">Dólar (USD)</p>
            <strong id="totalDolar" class="fs-5"></strong>
          </div>
          <div class="col-6 col-md-3">
            <p class="text-muted mb-1">Euro (EUR)</p>
            <strong id="totalEuro" class="fs-5"></strong>
          </div>
          <div class="col-6 col-md-3">
            <p class="text-muted mb-1">Bitcoin (BTC)</p>
            <strong id="totalBitcoin" class="fs-5"></strong>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
