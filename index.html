<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carteira Global · Extrato</title>
</head>
<body>

  <header>
    <h1>Carteira Global</h1>
    <p>Conversor de moedas e controle de gastos</p>
  </header>
  <main>
    <section id="page-extrato">

      <form id="expense-form">
        <div class="field">
          <label for="exp-name">Nome do gasto</label>
          <input type="text" id="exp-name" name="exp-name">
          <span class="error-msg" id="err-name"></span>
        </div>

        <div class="field">
          <label for="exp-value">Valor</label>
          <input type="text" id="exp-value" name="exp-value" inputmode="decimal">
          <span class="error-msg" id="err-value"></span>
        </div>

        <div class="field">
          <label for="exp-currency">Moeda</label>
          <select id="exp-currency" name="exp-currency">
            <option value="BRL">Real · BRL</option>
            <option value="USD">Dólar · USD</option>
            <option value="EUR">Euro · EUR</option>
            <option value="BTC">Bitcoin · BTC</option>
          </select>
        </div>

        <div class="field">
          <label for="exp-cat">Categoria</label>
          <select id="exp-cat" name="exp-cat">
            <option value="Alimentação">Alimentação</option>
            <option value="Transporte">Transporte</option>
            <option value="Lazer">Lazer</option>
          </select>
        </div>
        <button type="submit">Adicionar</button>
      </form>
      <div id="expense-list">
      </div>
    </section>
  </main>
</body>
</html>
