<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carteira Global · Extrato</title>
</head>

<body>

  <header>
    <h1>Carteira Global</h1>
    <p>Conversor de moedas e controle de gastos</p>
  </header>
  <main>
    <section>

      <form>
        <div>
          <label for="exp-name">Nome do gasto</label>
          <input type="text" id="exp-name" name="exp-name">
        </div>

        <div>
          <label for="valorGasto">Valor</label>
          <input type="text" id="valorGasto">
        </div>

        <div>
          <label for="moeda">Moeda</label>
          <select id="moeda" name="moeda">
            <option value="BRL">Real · BRL</option>
            <option value="USD">Dólar · USD</option>
            <option value="EUR">Euro · EUR</option>
            <option value="BTC">Bitcoin · BTC</option>
          </select>
        </div>

        <div>
          <label for="gastos">Categoria</label>
          <select id="gastos">
            <option value="Alimentação">Alimentação</option>
            <option value="Transporte">Transporte</option>
            <option value="Lazer">Lazer</option>
          </select>
        </div>
        <button type="button" onclick="calculoGastos()">Adicionar</button>
      </form>
      <script src="app/script.js"></script>
    </section>
  </main>
</body>

</html>
