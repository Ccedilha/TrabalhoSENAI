<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carteira Global - Extrato</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

  <div class="container mt-4">

    <h1>Carteira Global</h1>
    <p>Conversor de moedas e controle de gastos</p>

    <p>
      <a href="despesas.html">Total</a>
    </p>

    <hr>

    <div id="fallback-banner" class="alert alert-warning d-none" role="alert"></div>

    <h2>Novo gasto</h2>

    <form id="expense-form">
      <div class="mb-2">
        <label for="nomeGasto">Nome do gasto</label>
        <input type="text" id="nomeGasto" class="form-control">
        <small id="err-name" class="text-danger"></small>
      </div>

      <div class="mb-2">
        <label for="valorGasto">Valor</label>
        <input type="text" id="valorGasto" inputmode="decimal" class="form-control">
        <small id="err-value" class="text-danger"></small>
      </div>

      <div class="mb-2">
        <label for="moeda">Moeda</label>
        <select id="moeda" name="moeda" class="form-select">
          <option value="USD">Dólar - USD</option>
          <option value="BRL">Real - BRL</option>
          <option value="EUR">Euro - EUR</option>
          <option value="BTC">Bitcoin - BTC</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="categoriaGasto">Categoria</label>
        <select id="categoriaGasto" class="form-select">
          <option value="Alimentação">Alimentação</option>
          <option value="Transporte">Transporte</option>
          <option value="Lazer">Lazer</option>
          <option value="Outros">Outros</option>
        </select>
      </div>

      <button type="button" class="btn btn-primary" onclick="calculoGastos()">Adicionar</button>
    </form>

  </div>

  <script src="script.js"></script>
</body>

</html>
